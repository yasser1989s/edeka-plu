<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>E PLUS - Ultimate Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; text-align: center; padding: 10px; }
        .app-container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* تنسيق زر الكاميرا والصوت بجانب بعضهما */
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-cam { background: #3498db; }
        .btn-voice { background: #e67e22; }
        
        #video { width: 100%; border-radius: 12px; margin-top: 10px; display: none; }
        .success { background: #27ae60 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>⚡ E PLUS</h2>
    <input type="text" id="mainSearch" placeholder="بحث عن منتج..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
    
    <div class="controls">
        <button class="btn btn-cam" onclick="toggleCam()">📷 كاميرا</button>
        <button class="btn btn-voice" onclick="startVoice()">🎙️ صوت</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <div id="result" style="margin-top: 15px; font-weight: bold;">بانتظار الإدخال...</div>
</div>

<script>
    const video = document.getElementById('video');
    
    // تفعيل الكاميرا
    function toggleCam() {
        video.style.display = 'block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });
    }

    // تفعيل البحث الصوتي (Web Speech API)
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'de-DE';
        recognition.start();
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('mainSearch').value = transcript;
        };
    }
</script>
</body>
</html>
